<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — BBC Mobile Oman</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a1a2e;--accent:#e63946;--gold:#f4a261;--green:#10b981;
  --bg:#f4f5f7;--card:#fff;--border:#e5e7eb;--text:#1a1a2e;--muted:#6b7280;
  --radius:12px;--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(0,0,0,.12);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body.ar{font-family:'Cairo',sans-serif;direction:rtl}
a{text-decoration:none;color:inherit}

/* TOPBAR */
.topbar{background:var(--primary);color:#9aa5b4;font-size:12px;padding:7px 24px;display:flex;justify-content:space-between}
.topbar a{color:#9aa5b4;margin-inline-start:14px}

/* HEADER */
header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-inner{max-width:1280px;margin:auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:42px;height:42px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px}
.logo-text{font-weight:700;font-size:17px;color:var(--primary);line-height:1.1}
.logo-text span{display:block;font-size:11px;font-weight:400;color:var(--muted)}
.header-actions{display:flex;align-items:center;gap:10px;margin-inline-start:auto}
.btn-lang{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.cart-btn{background:var(--accent);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer;font-family:inherit}
.cart-count{background:#fff;color:var(--accent);border-radius:50%;width:20px;height:20px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* BREADCRUMB */
.breadcrumb{max-width:1280px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.breadcrumb a{color:var(--muted);transition:color .2s}
.breadcrumb a:hover{color:var(--accent)}
.bc-cur{color:var(--text);font-weight:500}

/* LAYOUT */
.product-wrap{max-width:1280px;margin:0 auto;padding:0 24px 60px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start}

/* GALLERY */
.gallery{position:sticky;top:80px}
.main-photo{width:100%;aspect-ratio:1;background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:12px;cursor:zoom-in;position:relative}
.main-photo img{width:100%;height:100%;object-fit:contain;padding:20px;transition:transform .3s;display:block}
.main-photo:hover img{transform:scale(1.05)}
.main-photo .emoji-ph{font-size:90px;line-height:1}
.sold-stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-12deg);background:rgba(26,26,46,.85);color:#fff;font-size:16px;font-weight:800;padding:10px 24px;border-radius:8px;text-transform:uppercase;letter-spacing:2px;pointer-events:none;display:none}
.thumbs-row{display:flex;gap:8px;flex-wrap:wrap}
.thumb{width:66px;height:66px;border-radius:10px;border:2px solid var(--border);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;transition:border .2s;flex-shrink:0}
.thumb:hover,.thumb.active{border-color:var(--accent)}
.thumb img{width:100%;height:100%;object-fit:contain;padding:4px;display:block}
.thumb .t-emoji{font-size:26px}

/* INFO */
.info{padding-top:4px}
.info-brand{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.info-title{font-size:26px;font-weight:800;line-height:1.25;margin-bottom:12px}
.stars-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.stars span{font-size:16px;color:#d1d5db}
.stars span.on{color:var(--gold)}
.rev-count{font-size:13px;color:var(--muted)}

/* PRICE */
.price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.price-main{font-size:32px;font-weight:800;color:var(--accent)}
.price-cur{font-size:15px;font-weight:500;color:var(--muted);align-self:flex-end;margin-bottom:4px}
.price-old{font-size:15px;color:var(--muted);text-decoration:line-through}
.disc-badge{background:#fee2e2;color:var(--accent);font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.install-hint{background:#f0fdf4;border:1px solid #bbf7d0;color:#065f46;font-size:13px;padding:8px 14px;border-radius:8px;margin-bottom:18px}

/* TAGS */
.tags-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.tag{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.tag-new{background:#d1fae5;color:#065f46}
.tag-sale{background:#fee2e2;color:var(--accent)}
.tag-sold{background:#f3f4f6;color:#6b7280}

/* DESC */
.desc-box{background:#f9fafb;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:14px;color:var(--muted);line-height:1.8}

/* COLOR VARIANTS */
.variants-box{margin-bottom:20px}
.variants-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.swatches{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.swatch:hover{transform:scale(1.12)}
.swatch.active{border-color:#333;box-shadow:0 0 0 2px #fff,0 0 0 4px #333}
.variant-info{font-size:13px;color:var(--text);font-weight:500;min-height:20px}
.v-stock-in{color:var(--green);font-weight:600}
.v-stock-out{color:var(--accent);font-weight:600}

/* QTY */
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.qty-label{font-size:14px;font-weight:600}
.qty-ctrl{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:9px;overflow:hidden}
.qty-btn{background:#f9fafb;border:none;width:38px;height:38px;font-size:20px;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;font-weight:600}
.qty-btn:hover{background:var(--accent);color:#fff}
.qty-num{width:48px;text-align:center;font-size:15px;font-weight:700;border:none;outline:none;font-family:inherit;background:#fff}

/* BUTTONS */
.btn-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.btn-cart{flex:1;min-width:150px;background:var(--primary);color:#fff;border:none;padding:14px 20px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s;font-family:inherit}
.btn-cart:hover{background:var(--accent)}
.btn-cart:disabled{background:#d1d5db;color:#9ca3af;cursor:not-allowed}
.btn-wish{background:#fff;border:1.5px solid var(--border);padding:14px 18px;border-radius:10px;font-size:20px;cursor:pointer;transition:all .2s}
.btn-wish:hover,.btn-wish.wishlisted{border-color:var(--accent);background:#fff5f5;color:var(--accent)}
.btn-wa{width:100%;background:#25d366;color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s;font-family:inherit;margin-bottom:16px}
.btn-wa:hover{opacity:.9}

/* META */
.meta-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px}
.meta-item{display:flex;align-items:center;gap:10px;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border)}
.meta-item:last-child{border-bottom:none}
.meta-icon{font-size:18px;width:24px;flex-shrink:0}
.meta-text{color:var(--muted)}
.meta-text b{color:var(--text)}

/* RELATED */
.related{max-width:1280px;margin:0 auto;padding:0 24px 60px}
.related h2{font-size:20px;font-weight:700;margin-bottom:18px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.rel-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s}
.rel-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.rel-img{height:120px;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:40px}
.rel-img img{width:100%;height:100%;object-fit:contain;padding:8px;display:block}
.rel-info{padding:10px 12px}
.rel-name{font-size:12px;font-weight:600;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.rel-price{font-size:13px;font-weight:700;color:var(--accent)}

/* CART SIDEBAR */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;backdrop-filter:blur(2px)}
.cart-overlay.open{display:block}
.cart-sidebar{position:fixed;top:0;inset-inline-end:-420px;width:400px;height:100%;background:#fff;z-index:600;transition:inset-inline-end .3s;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.cart-sidebar.open{inset-inline-end:0}
.cart-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-head h3{font-size:17px;font-weight:700}
.cart-close{background:var(--bg);border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cart-close:hover{background:var(--accent);color:#fff}
.cart-list{flex:1;overflow-y:auto;padding:16px}
.cart-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.ci-img{width:56px;height:56px;object-fit:contain;background:var(--bg);border-radius:8px;padding:4px;border:1px solid var(--border);flex-shrink:0}
.ci-emoji{width:56px;height:56px;background:var(--bg);border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.ci-info{flex:1}
.ci-name{font-size:13px;font-weight:600;margin-bottom:3px}
.ci-price{font-size:13px;font-weight:700;color:var(--accent)}
.ci-remove{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;align-self:start}
.ci-remove:hover{color:var(--accent)}
.empty-cart{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--muted);gap:12px;text-align:center}
.cart-foot{padding:20px 24px;border-top:1px solid var(--border)}
.cart-row{display:flex;justify-content:space-between;font-size:14px;padding:5px 0}
.cart-grand{font-weight:700;font-size:16px;padding-top:10px;border-top:1px solid var(--border);margin-top:6px}
.free-tag{background:#d1fae5;color:#065f46;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.btn-checkout{display:block;width:100%;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;text-align:center;margin-top:14px;cursor:pointer;font-family:inherit}
.btn-checkout:hover{background:#c1121f}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1}

/* ADMIN FAB */
#admin-fab{position:fixed;bottom:24px;right:24px;z-index:10000;background:#1a1a2e;color:#fff;width:48px;height:48px;border-radius:50%;font-size:20px;box-shadow:0 4px 16px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;text-decoration:none;border:2px solid rgba(255,255,255,.12);opacity:0;transition:opacity .3s}
#admin-fab:hover{opacity:1!important}

/* NOT FOUND */
.not-found{max-width:400px;margin:80px auto;text-align:center;padding:24px;color:var(--muted)}

@media(max-width:768px){
  .product-wrap{grid-template-columns:1fr;gap:24px;padding:0 16px 40px}
  .gallery{position:static}
  .info-title{font-size:20px}
  .price-main{font-size:26px}
  .related-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

function getAllProducts() {
  const overrides  = JSON.parse(localStorage.getItem('bbc_stock_overrides') || '{}');
  const adminProds = JSON.parse(localStorage.getItem('bbc_admin_products')   || '[]');
  const published  = adminProds.filter(p => p.status === 'published').map(p => ({
    id:       p.id,
    brand:    p.brand,
    nameEn:   p.nameEn,
    nameAr:   p.nameAr || p.nameEn,
    cat:      p.cat,
    price:    p.price,
    oldPrice: p.oldPrice || null,
    img:      p.photos && p.photos.length ? (typeof p.photos[0]==='string' ? p.photos[0] : p.photos[0]) : null,
    photos:   p.photos || [],
    isNew:    p.isNew   || false,
    isSale:   p.isSale  || false,
    soldOut:  overrides[p.id] !== undefined ? overrides[p.id] : (p.soldOut || false),
    stars:    p.stars   || 4,
    desc:     p.descEn  || '',
    descAr:   p.descAr  || '',
    variants: p.variants || [],
    _admin:   true,
  }));
  const hardcoded = PRODUCTS.map(p => ({
    ...p,
    photos:   p.img ? [p.img] : [],
    variants: p.variants || [],
    soldOut:  overrides[p.id] !== undefined ? overrides[p.id] : (p.soldOut || false),
  }));
  return [...published, ...hardcoded];
}

// ── LANGUAGE ──────────────────────────────────────────────
let isAr = localStorage.getItem('bbc_lang') === 'ar';
function toggleLang() {
  isAr = !isAr;
  localStorage.setItem('bbc_lang', isAr ? 'ar' : 'en');
  applyLang();
  renderPage();
}
function applyLang() {
  document.getElementById('body').classList.toggle('ar', isAr);
  document.documentElement.setAttribute('dir', isAr ? 'rtl' : 'ltr');
  document.getElementById('lang-btn').textContent = isAr ? 'English' : 'عربي';
  document.querySelectorAll('[data-en]').forEach(el => {
    el.innerHTML = el.getAttribute(isAr ? 'data-ar' : 'data-en') || '';
  });
}

// ── CART ──────────────────────────────────────────────────
let cart = JSON.parse(localStorage.getItem('bbc_cart') || '[]');
function saveCart() { localStorage.setItem('bbc_cart', JSON.stringify(cart)); }
function updateCartCount() {
  const n = cart.reduce((a, c) => a + c.qty, 0);
  document.getElementById('cart-count').textContent = n || 0;
}
function openCart()  { document.getElementById('cart-overlay').classList.add('open'); document.getElementById('cart-sidebar').classList.add('open'); renderCart(); }
function closeCart() { document.getElementById('cart-overlay').classList.remove('open'); document.getElementById('cart-sidebar').classList.remove('open'); }
function renderCart() {
  const list = document.getElementById('cart-list');
  const foot = document.getElementById('cart-foot');
  if (!cart.length) {
    list.innerHTML = '<div class="empty-cart"><div style="font-size:48px">🛒</div><p>' + (isAr ? 'سلتك فارغة' : 'Your cart is empty') + '</p></div>';
    foot.style.display = 'none'; return;
  }
  list.innerHTML = cart.map(p => `
    <div class="cart-item">
      ${p.img ? `<img src="${p.img}" class="ci-img" alt="">` : `<div class="ci-emoji">${EMOJIS[p.brand]||'📱'}</div>`}
      <div class="ci-info">
        <div class="ci-name">${isAr ? p.nameAr : p.nameEn}${p.variantName ? ' — '+p.variantName : ''}</div>
        <div class="ci-price">${(p.price * p.qty).toFixed(3)} OMR × ${p.qty}</div>
      </div>
      <button class="ci-remove" onclick="removeFromCart(${p.cartKey||p.id})">✕</button>
    </div>`).join('');
  const total = cart.reduce((a, c) => a + c.price * c.qty, 0);
  document.getElementById('cart-sub').textContent   = total.toFixed(3) + ' OMR';
  document.getElementById('cart-total').textContent = total.toFixed(3) + ' OMR';
  foot.style.display = 'block';
}
function removeFromCart(key) {
  cart = cart.filter(x => (x.cartKey || x.id) !== key);
  saveCart(); updateCartCount(); renderCart();
}

// ── WISHLIST ──────────────────────────────────────────────
let wishlist = JSON.parse(localStorage.getItem('bbc_wish') || '[]');
function saveWish() { localStorage.setItem('bbc_wish', JSON.stringify(wishlist)); }

// ── STATE ─────────────────────────────────────────────────
let currentProduct = null;
let currentPhotos  = [];
let selectedVariant = null;

// ── RENDER PAGE ───────────────────────────────────────────
function renderPage() {
  const id  = new URLSearchParams(location.search).get('id');
  const all = getAllProducts();
  const p   = all.find(x => String(x.id) === String(id));

  if (!p) {
    document.getElementById('main-content').innerHTML = `
      <div class="not-found">
        <div style="font-size:60px;margin-bottom:16px">📱</div>
        <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)">${isAr?'المنتج غير موجود':'Product not found'}</h2>
        <p style="margin-bottom:20px">${isAr?'تحقق من الرابط أو تصفح منتجاتنا':'Check the link or browse our products'}</p>
        <a href="products.html" style="display:inline-block;background:var(--accent);color:#fff;padding:11px 24px;border-radius:9px;font-weight:700">${isAr?'تصفح المنتجات':'Browse Products'}</a>
      </div>`;
    return;
  }

  currentProduct = p;
  document.title  = (isAr ? p.nameAr : p.nameEn) + ' — BBC Mobile Oman';
  document.getElementById('bc-name').textContent = isAr ? p.nameAr : p.nameEn;

  // Build photo list
  if (p._admin && p.photos && p.photos.length) {

    currentPhotos = [p.img];
  } else {
    currentPhotos = [];

  // Tags
  const tags = [];

  else if (p.isNew) tags.push(`<span class="tag tag-new">${isAr?'جديد':'New'}</span>`);
  if (p.isSale)  tags.push(`<span class="tag tag-sale">${isAr?'خصم':'Sale'}</span>`);

  // Main image HTML
  const mainImgHTML = currentPhotos.length
    ? '<img id="main-img" src="' + currentPhotos[0] + '" alt="' + (isAr?p.nameAr:p.nameEn) + '" style="width:100%;height:100%;object-fit:contain;padding:20px;display:block;transition:transform .3s" onerror=\"this.style.display=\'none\';document.getElementById(\'main-emoji\').style.display=\'flex\'">'
    : '';

  // Thumbnails
  const thumbsHTML = currentPhotos.length > 1
    ? currentPhotos.map((src, i) => `
        <div class="thumb ${i===0?'active':''}" onclick="switchPhoto(${i},this)">
          <img src="${src}" alt="Photo ${i+1}" onerror="this.parentElement.style.display='none'">
        </div>`).join('')
    : '';

  // Install hint
  const monthly = (p.price / 12).toFixed(3);
  const installHTML = p.price >= 50
    ? '<div class="install-hint" style="display:block">' + (isAr ? `أو ${monthly} ر.ع. / شهر — تقسيط 12 شهراً` : `Or ${monthly} OMR/month — 12-month installment available`) + '</div>'
    : '';

  // Build HTML safely (no nested backticks)
  const oldPriceHTML  = p.oldPrice ? '<span class="price-old">' + p.oldPrice.toFixed(3) + '</span>' : '';
  const discountHTML  = discount   ? '<span class="disc-badge">-' + discount + '%</span>' : '';
  const tagsHTML      = tags.length ? '<div class="tags-row">' + tags.join('') + '</div>' : '';
  const descHTML      = desc        ? '<div class="desc-box" style="display:block">' + desc + '</div>' : '';
  const thumbsHTML2   = currentPhotos.length > 1
    ? currentPhotos.map((src, i) =>

        '<img src="' + src + '" alt="Photo ' + (i+1) + '" onerror="this.parentElement.style.display='none'">' +
        '</div>'
      ).join('')
    : '';
  const starsHTML = Array.from({length:5}, (_, i) =>
    '<span class="' + (i < (p.stars||4) ? 'on' : '') + '">★</span>'
  ).join('');
  const soldStampStyle = p.soldOut ? 'display:block' : 'display:none';
  const soldStampText  = isAr ? 'نفذت الكمية' : 'Sold Out';
  const btnCartDisabled = p.soldOut ? 'disabled' : '';
  const btnCartText = p.soldOut
    ? ('🚫 ' + (isAr ? 'نفذت الكمية' : 'Sold Out'))
    : ('🛒 ' + (isAr ? 'أضف للسلة' : 'Add to Cart'));
  const wishHeart = wishlist.includes(p.id) ? '♥' : '♡';
  const waText = isAr ? 'اطلب عبر واتساب' : 'Order via WhatsApp';
  const freeDelText  = isAr ? 'توصيل مجاني' : 'Free delivery';
  const inMuscat     = isAr ? 'في مسقط' : 'in Muscat';
  const warText      = isAr ? 'ضمان رسمي' : 'Official warranty';
  const inclText     = isAr ? 'شامل' : 'included';
  const retText      = isAr ? '14 يوماً' : '14 days';
  const easyRet      = isAr ? 'إرجاع سهل' : 'easy returns';
  const genText      = isAr ? 'أصلي 100%' : '100% genuine';
  const certText     = isAr ? 'منتج معتمد' : 'certified product';
  const qtyText      = isAr ? 'الكمية:' : 'Quantity:';
  const cartText     = isAr ? 'سلة التسوق' : 'Your Cart';
  const mainImgEl    = currentPhotos.length
    ? '<img id="main-img" src="' + currentPhotos[0] + '" alt="' + (isAr?p.nameAr:p.nameEn) + '" style="width:100%;height:100%;object-fit:contain;padding:20px;display:block;transition:transform .3s" onerror="this.style.display='none';document.getElementById('main-emoji').style.display='flex'">'
    : '';
  const emojiEl = '<div id="main-emoji" style="font-size:90px;line-height:1;display:' + (currentPhotos.length?'none':'flex') + ';align-items:center;justify-content:center">' + (EMOJIS[p.brand]||'📱') + '</div>';

  // Variants HTML
  let variantsHTML = '';
  if (p.variants && p.variants.length) {
    const swatchesHTML = p.variants.map((v, i) =>
      '<div class="swatch ' + (i===0?'active':'') + '" style="background:' + (v.color||'#888') + '" title="' + (v.name||'') + '" onclick="selectVariant(' + i + ')" id="sw-' + i + '"></div>'
    ).join('');
    variantsHTML = '<div class="variants-box" style="display:block">' +
      '<div class="variants-title">' + (isAr?'اختر اللون / التخزين:':'Select Color / Storage:') + '</div>' +
      '<div class="swatches" id="swatches">' + swatchesHTML + '</div>' +
      '<div class="variant-info" id="variant-info"></div>' +
      '</div>';
  }

  document.getElementById('main-content').innerHTML =
    '<div class="product-wrap">' +
      '<div class="gallery">' +
        '<div class="main-photo" id="main-photo">' +
          mainImgEl + emojiEl +
          '<div class="sold-stamp" id="sold-stamp" style="' + soldStampStyle + '">' + soldStampText + '</div>' +
        '</div>' +
        '<div class="thumbs-row" id="thumbs-row">' + thumbsHTML2 + '</div>' +
      '</div>' +
      '<div class="info">' +
        '<div class="info-brand">' + brandName + '</div>' +
        '<h1 class="info-title">' + (isAr?p.nameAr:p.nameEn) + '</h1>' +
        '<div class="stars-row"><div class="stars">' + starsHTML + '</div><span class="rev-count">(' + (p.stars||4) + '.0/5)</span></div>' +
        '<div class="price-row">' +
          '<span class="price-main" id="price-main">' + p.price.toFixed(3) + '</span>' +
          '<span class="price-cur">OMR</span>' +
          oldPriceHTML + discountHTML +
        '</div>' +
        installHTML +
        tagsHTML +
        descHTML +
        variantsHTML +
        '<div class="qty-row">' +
          '<span class="qty-label">' + qtyText + '</span>' +
          '<div class="qty-ctrl">' +
            '<button class="qty-btn" onclick="changeQty(-1)">−</button>' +
            '<input type="number" class="qty-num" id="qty" value="1" min="1" max="99">' +
            '<button class="qty-btn" onclick="changeQty(1)">+</button>' +
          '</div>' +
        '</div>' +
        '<div class="btn-row">' +
          '<button class="btn-cart" id="btn-cart" onclick="doAddToCart()" ' + btnCartDisabled + '>' + btnCartText + '</button>' +
          '<button class="btn-wish ' + (wishlist.includes(p.id)?'wishlisted':'') + '" id="btn-wish" onclick="doWishlist()">' + wishHeart + '</button>' +
        '</div>' +
        '<button class="btn-wa" onclick="doWhatsApp()">' +
          '<svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>' +
          waText +
        '</button>' +
        '<div class="meta-box">' +
          '<div class="meta-item"><span class="meta-icon">🚚</span><span class="meta-text"><b>' + freeDelText + '</b> ' + inMuscat + '</span></div>' +
          '<div class="meta-item"><span class="meta-icon">🛡️</span><span class="meta-text"><b>' + warText + '</b> ' + inclText + '</span></div>' +
          '<div class="meta-item"><span class="meta-icon">🔄</span><span class="meta-text"><b>' + retText + '</b> ' + easyRet + '</span></div>' +
          '<div class="meta-item"><span class="meta-icon">✅</span><span class="meta-text"><b>' + genText + '</b> ' + certText + '</span></div>' +
        '</div>' +
      '</div>' +
    '</div>';

  // Init variant selection
  if (p.variants && p.variants.length) selectVariant(0);

  // Wishlist button state
  const wb = document.getElementById('btn-wish');
  if (wb && wishlist.includes(p.id)) wb.classList.add('wishlisted');

  // Related products
  renderRelated(p);
}

// ── GALLERY CONTROLS ──────────────────────────────────────
function switchPhoto(i, el) {
  const mainImg = document.getElementById('main-img');
  if (mainImg) {
    mainImg.src = currentPhotos[i];
    mainImg.style.display = 'block';
    const emoji = document.getElementById('main-emoji');
    if (emoji) emoji.style.display = 'none';
  }
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
}

// ── VARIANT SELECTION ─────────────────────────────────────
function selectVariant(i) {
  const p = currentProduct;
  if (!p || !p.variants || !p.variants[i]) return;
  const v = p.variants[i];
  selectedVariant = v;

  // Update swatches
  document.querySelectorAll('.swatch').forEach((s, j) => s.classList.toggle('active', j === i));

  // Update info label
  const infoEl = document.getElementById('variant-info');
  if (infoEl) {
    let info = `<b>${v.name || ''}</b>`;
    if (v.price) info += ` — ${parseFloat(v.price).toFixed(3)} OMR`;
    if (v.stock !== '' && v.stock !== null && v.stock !== undefined) {
      const qty = parseInt(v.stock);
      info += qty > 0
        ? ` <span class="v-stock-in">● ${qty} ${isAr?'متوفر':'in stock'}</span>`
        : ` <span class="v-stock-out">● ${isAr?'نفذت الكمية':'Sold Out'}</span>`;
    }
    infoEl.innerHTML = info;
  }

  // Update price
  if (v.price) {
    const pe = document.getElementById('price-main');
    if (pe) pe.textContent = parseFloat(v.price).toFixed(3);
  }

  // Switch to variant photo
  if (v.photo) {
    const mainImg = document.getElementById('main-img');
    if (mainImg) { mainImg.src = v.photo; mainImg.style.display = 'block'; }
    const emoji = document.getElementById('main-emoji');
    if (emoji) emoji.style.display = 'none';
  }

  // Sold out per variant
  const btnCart = document.getElementById('btn-cart');
  if (btnCart) {
    const soldOut = v.stock !== undefined && v.stock !== '' && parseInt(v.stock) === 0;
    btnCart.disabled = soldOut;
    btnCart.innerHTML = soldOut
      ? '🚫 ' + (isAr ? 'نفذت الكمية' : 'Sold Out')
      : '🛒 ' + (isAr ? 'أضف للسلة' : 'Add to Cart');
  }
}

// ── QTY ───────────────────────────────────────────────────
function changeQty(d) {
  const inp = document.getElementById('qty');
  if (inp) inp.value = Math.max(1, Math.min(99, (parseInt(inp.value) || 1) + d));
}

// ── ADD TO CART ───────────────────────────────────────────
function doAddToCart() {
  const p = currentProduct;
  if (!p || p.soldOut) return;
  const qty  = parseInt(document.getElementById('qty')?.value) || 1;
  const vName = selectedVariant ? selectedVariant.name : null;
  const vPrice = selectedVariant && selectedVariant.price ? parseFloat(selectedVariant.price) : p.price;
  const vPhoto = selectedVariant && selectedVariant.photo ? selectedVariant.photo : p.img;
  const cartKey = vName ? `${p.id}_${vName}` : p.id;
  const existing = cart.find(x => (x.cartKey || x.id) === cartKey);
  if (existing) { existing.qty += qty; }
  else {
    cart.push({
      id: p.id, cartKey,
      nameEn: p.nameEn, nameAr: p.nameAr,
      brand: p.brand, price: vPrice,
      img: vPhoto || p.img || null,
      variantName: vName, qty,
    });
  }
  saveCart(); updateCartCount();
  showToast(isAr ? '✅ تمت الإضافة للسلة' : '✅ Added to cart!');
  setTimeout(openCart, 400);
}

// ── WISHLIST ──────────────────────────────────────────────
function doWishlist() {
  const p = currentProduct;
  if (!p) return;
  const idx = wishlist.indexOf(p.id);
  const btn = document.getElementById('btn-wish');
  if (idx > -1) {
    wishlist.splice(idx, 1);
    if (btn) { btn.textContent = '♡'; btn.classList.remove('wishlisted'); }
    showToast(isAr ? 'تمت الإزالة من المفضلة' : 'Removed from wishlist');
  } else {
    wishlist.push(p.id);
    if (btn) { btn.textContent = '♥'; btn.classList.add('wishlisted'); }
    showToast(isAr ? '♥ أضيف للمفضلة' : '♥ Added to wishlist!');
  }
  saveWish();
}

// ── WHATSAPP ──────────────────────────────────────────────
function doWhatsApp() {
  const p = currentProduct;
  if (!p) return;
  const name = isAr ? p.nameAr : p.nameEn;
  const variant = selectedVariant ? ` (${selectedVariant.name})` : '';
  const msg = `Hi BBC Mobile! I'm interested in *${name}${variant}* — Price: ${(selectedVariant?.price || p.price).toFixed(3)} OMR. Please confirm availability.`;
  window.open(`https://wa.me/96878879905?text=${encodeURIComponent(msg)}`, '_blank');
}

// ── RELATED ───────────────────────────────────────────────
function renderRelated(p) {
  const all     = getAllProducts();
  const related = all.filter(x => x.id !== p.id && (x.brand === p.brand || x.cat === p.cat)).slice(0, 6);
  const section = document.getElementById('related-section');
  const grid    = document.getElementById('related-grid');
  if (!related.length || !section || !grid) return;
  section.style.display = 'block';
  grid.innerHTML = related.map(r => {
    const rname = isAr ? r.nameAr : r.nameEn;
    return `
    <div class="rel-card" onclick="location.href='product.html?id=${r.id}'">
      <div class="rel-img">
        ${r.img ? `<img src="${r.img}" alt="${rname}" onerror="this.parentElement.innerHTML='<span style=font-size:40px>${EMOJIS[r.brand]||'📱'}</span>'">` : `<span style="font-size:40px">${EMOJIS[r.brand]||'📱'}</span>`}
      </div>
      <div class="rel-info">
        <div class="rel-name">${rname}</div>
        <div class="rel-price">${r.price.toFixed(3)} <small style="font-size:10px;font-weight:400">OMR</small></div>
      </div>
    </div>`;
  }).join('');
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────
applyLang();
renderPage();
updateCartCount();
</script>
